<!DOCTYPE html>
<html lang= en>
<head>
  <meta charset=UTF-8>
  <meta name=viewport content=width=device-width initial-scale=1.0>
  <title>Vintage Shop</title>
  <link rel=stylesheet href=style.css>
</head>
<body>
  <button id="menuToggle" class="menu-toggle" aria-label="Open navigation">☰</button>

  <aside id="sideNav" class="side-nav" aria-hidden="true">
    <button id="closeNav" class="close-nav" aria-label="Close navigation">×</button>
    <nav>
      <a href="#home">Home</a>
      <a href="#shop">Shop</a>
      <a href="#newsletter">Newsletter</a>
      <a href="#help">Help</a>
      <a href="#company">Company</a>
    </nav>
  </aside>

  <div id="navOverlay" class="nav-overlay" aria-hidden="true"></div>

  <main class=container>
    <section class=carousel-wrapper>
      <div class="slideshow" aria-live="polite" aria-label="Fading hero slides">
        <div class="slide slide-1"></div>
        <div class="slide slide-2"></div>
        <div class="slide slide-3"></div>
        <div class="slide slide-4"></div>
        <div class="slide slide-5"></div>
      </div>
    </section>
    <section id=newsletter class=newsletter>
      <h3>Newsletter</h3>
      <form id=newsletterForm class=newsletter-form action=#>
        <input type=email placeholder=Email Address required>
        <button type=submit>Subscribe</button>
      </form>
    </section>
    <footer class=footer-grid>
      <div>
        <h4>Shop</h4>
        <a href=#>Home</a>
        <a href=#>Rantisei</a>
        <a href=#>Bamtical</a>
      </div>
      <div>
        <h4>Help</h4>
        <a href=#>Home</a>
        <a href=#>Rantical</a>
        <a href=#>Bamtical</a>
      </div>
      <div>
        <h4>Company</h4>
        <a href=#>Home</a>
        <a href=#>Rantical</a>
        <a href=#>Bamtical</a>
      </div>
      <div>
        <h4>Social</h4>
        <div class=social-icons>
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
    </footer>
  </main>
  <script src=script.js></script>
</body>
</html>
